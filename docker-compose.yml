version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: accounting-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: accounting_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - accounting-network

  redis:
    image: redis:7-alpine
    container_name: accounting-redis
    restart: always
    networks:
      - accounting-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: accounting-api
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    networks:
      - accounting-network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: accounting-worker
    command: celery -A celery_app.celery_app worker --loglevel=info
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    networks:
      - accounting-network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: accounting-beat
    command: celery -A celery_app.celery_app beat --loglevel=info
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    networks:
      - accounting-network

networks:
  accounting-network:
    driver: bridge

volumes:
  postgres_data:
